<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🐟 개복치 카페인 테스트</title>
<link href="https://fonts.googleapis.com/css2?family=Jua&family=Noto+Sans+KR:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --green: #4CAF50;
    --yellow: #F5A623;
    --orange: #E05C2A;
    --purple: #7B2FBE;
    --dark: #1a1a2e;
    --card-bg: #16213e;
    --text: #e8e8e8;
    --accent: #00d4ff;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Noto Sans KR', sans-serif;
    background: var(--dark);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: radial-gradient(circle, #ffffff08 1px, transparent 1px);
    background-size: 24px 24px;
    pointer-events: none;
    z-index: 0;
  }
  .container {
    max-width: 720px;
    margin: 0 auto;
    padding: 24px 16px;
    position: relative;
    z-index: 1;
  }
  .screen { display: none; animation: fadeIn 0.4s ease; }
  .screen.active { display: block; }
  @keyframes fadeIn { from { opacity:0; transform:translateY(16px); } to { opacity:1; transform:translateY(0); } }

  /* INTRO */
  .intro-logo { text-align: center; padding: 48px 0 32px; }
  .intro-logo img {
    width: 200px; height: 200px;
    object-fit: cover;
    border-radius: 20px;
    border: 3px solid var(--accent);
    box-shadow: 0 0 32px #00d4ff55;
    image-rendering: pixelated;
  }
  .intro-title {
    font-family: 'Jua', sans-serif;
    font-size: 2.4rem;
    line-height: 1.2;
    margin: 20px 0 8px;
    background: linear-gradient(135deg, #00d4ff, #a855f7);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }
  .intro-sub { color: #aaa; font-size: 0.95rem; line-height: 1.7; margin-bottom: 36px; }

  /* SECTION HEADER */
  .section-header {
    display: flex; align-items: center; gap: 12px;
    margin: 28px 0 20px; padding: 14px 18px;
    border-radius: 14px; border: 2px solid;
  }
  .section-header.type-a { background: #0d2818; border-color: var(--green); }
  .section-header.type-b { background: #2a1a0a; border-color: var(--yellow); }
  .section-header-icon { font-size: 1.8rem; }
  .section-header-text h2 { font-family: 'Jua', sans-serif; font-size: 1.1rem; }
  .section-header-text p { font-size: 0.8rem; color: #aaa; margin-top: 2px; }

  /* QUESTION CARD */
  .question-card {
    background: var(--card-bg);
    border-radius: 18px; padding: 24px; margin-bottom: 20px;
    border: 1px solid #ffffff15;
    box-shadow: 0 4px 24px #00000040;
    transition: border-color 0.2s;
  }
  .question-card.answered { border-color: #00d4ff40; }
  .q-number { font-size: 0.75rem; color: var(--accent); font-weight: 700; letter-spacing: 2px; margin-bottom: 8px; }
  .q-text { font-size: 1rem; line-height: 1.6; margin-bottom: 18px; color: #e0e0e0; }

  /* Option buttons */
  .options-grid { display: grid; grid-template-columns: repeat(10, 1fr); gap: 6px; margin-top: 4px; }
  .opt-btn {
    aspect-ratio: 1;
    border: 2px solid #333; border-radius: 10px;
    background: #0f0f1a; color: #888;
    font-family: 'Jua', sans-serif; font-size: 0.9rem;
    cursor: pointer; transition: all 0.15s;
  }
  .opt-btn:hover { border-color: var(--accent); color: var(--accent); background: #00d4ff15; }
  .opt-btn.selected { border-color: var(--accent); color: #000; background: var(--accent); box-shadow: 0 0 10px var(--accent); }
  .score-label { display: flex; justify-content: space-between; font-size: 0.72rem; color: #666; margin-top: 6px; }

  /* PROGRESS */
  .progress-wrap { margin-bottom: 28px; padding: 0 4px; }
  .progress-info { display: flex; justify-content: space-between; font-size: 0.8rem; color: #888; margin-bottom: 8px; }
  .progress-bar-bg { height: 8px; background: #222; border-radius: 4px; overflow: hidden; }
  .progress-bar-fill { height: 100%; background: linear-gradient(90deg, var(--accent), #a855f7); border-radius: 4px; transition: width 0.4s ease; }

  /* BUTTONS */
  .btn { display: inline-block; font-family: 'Jua', sans-serif; font-size: 1.1rem; padding: 14px 32px; border-radius: 14px; border: none; cursor: pointer; transition: all 0.2s; text-align: center; }
  .btn-primary { background: linear-gradient(135deg, #00d4ff, #a855f7); color: #000; box-shadow: 0 4px 20px #00d4ff44; }
  .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 8px 28px #00d4ff66; }
  .btn-secondary { background: transparent; color: var(--accent); border: 2px solid var(--accent); }
  .btn-secondary:hover { background: #00d4ff15; }
  .btn-block { width: 100%; display: block; }
  .btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none !important; }

  /* RESULT */
  .result-img {
    width: 260px; height: 260px;
    object-fit: cover;
    border-radius: 24px;
    border: 4px solid;
    display: block; margin: 0 auto 24px;
    image-rendering: pixelated;
    transition: box-shadow 0.3s;
  }
  .result-title {
    font-family: 'Jua', sans-serif; font-size: 2rem;
    line-height: 1.3; margin-bottom: 8px; text-align: center;
  }
  .result-subtitle { color: #aaa; font-size: 0.9rem; margin-bottom: 28px; text-align: center; line-height: 1.6; }
  .result-score-row { display: flex; justify-content: center; gap: 24px; margin-bottom: 24px; }
  .score-pill { padding: 10px 20px; border-radius: 12px; text-align: center; }
  .score-pill .sp-label { font-size: 0.7rem; color: #aaa; margin-bottom: 4px; }
  .score-pill .sp-val { font-family: 'Jua', sans-serif; font-size: 1.6rem; }
  .result-cards { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; margin-bottom: 24px; }
  .result-card { background: var(--card-bg); border-radius: 16px; padding: 18px; border: 1px solid #ffffff15; }
  .result-card-icon { font-size: 1.5rem; margin-bottom: 8px; }
  .result-card h3 { font-family: 'Jua', sans-serif; font-size: 0.95rem; margin-bottom: 6px; }
  .result-card p { font-size: 0.8rem; line-height: 1.6; color: #ccc; }
  .prescription { background: linear-gradient(135deg, #0d1b2a, #1a1040); border: 1px solid #a855f755; border-radius: 18px; padding: 20px; margin-bottom: 28px; }
  .prescription h3 { font-family: 'Jua', sans-serif; font-size: 1rem; color: #a855f7; margin-bottom: 12px; }
  .prescription li { font-size: 0.83rem; line-height: 1.9; color: #ccc; padding-left: 4px; }

  /* Fish float */
  .fish-float { position: fixed; font-size: 1.5rem; opacity: 0.07; pointer-events: none; animation: fishSwim linear infinite; z-index: 0; }
  @keyframes fishSwim {
    from { transform: translateX(-80px) translateY(0); }
    50% { transform: translateX(50vw) translateY(-30px); }
    to { transform: translateX(calc(100vw + 80px)) translateY(0); }
  }

  @media (max-width: 520px) {
    .options-grid { grid-template-columns: repeat(5, 1fr); }
    .result-cards { grid-template-columns: 1fr; }
    .result-img { width: 200px; height: 200px; }
  }
</style>
</head>

    rx:["지금 당장 의료 전문가와 상담하는 것을 강력히 권장합니다.","카페인 일지를 작성하여 정확한 섭취량을 파악하세요.","2-4주에 걸쳐 점진적으로 섭취량을 절반으로 줄이세요.","금단 두통 시 진통제를 단기 사용할 수 있습니다 (의사 상담 후).","대체재: 따뜻한 물, 허브티, 짧은 낮잠(20분)을 활용하세요."] }
];

const QUESTIONS_PER_PAGE = 5;
let answers = new Array(20).fill(null);
let currentPage = 0;

function getPageQuestions(page) {
  const start = page * QUESTIONS_PER_PAGE;
  const allQ = [...QUESTIONS_A, ...QUESTIONS_B];
  return allQ.slice(start, start + QUESTIONS_PER_PAGE).map((q, i) => ({ text: q, idx: start + i }));
}

function renderQuestions(page) {
  const container = document.getElementById("questions-container");
  const questions = getPageQuestions(page);
  const isA = page < 2;

  let html = `<div class="section-header type-${isA ? "a" : "b"}">
    <div class="section-header-icon">${isA ? "🫀" : "☕"}</div>
    <div class="section-header-text">
      <h2>${isA ? "A. 카페인 민감도 테스트" : "B. 카페인 의존·중독 경향 테스트"}</h2>
      <p>${isA ? "카페인에 대한 신체 반응을 확인합니다" : "카페인 의존 패턴을 확인합니다"}</p>
    </div>
  </div>`;

  questions.forEach(({ text, idx }) => {
    const isAnswered = answers[idx] !== null;
    html += `<div class="question-card ${isAnswered ? "answered" : ""}" id="qcard-${idx}">
      <div class="q-number">Q${idx + 1} / 20</div>
      <div class="q-text">${text}</div>
      <div class="options-grid">
        ${Array.from({length:10},(_,i) => {
          const n = i+1;
          const sel = answers[idx] === n ? "selected" : "";
          return `<button class="opt-btn ${sel}" onclick="selectAnswer(${idx},${n})">${n}</button>`;
        }).join("")}
      </div>
      <div class="score-label"><span>전혀 아니다</span><span>매우 그렇다</span></div>
    </div>`;
  });

  container.innerHTML = html;
  updateProgress();
  checkNextEnabled();
}

function selectAnswer(qIdx, val) {
  answers[qIdx] = val;
  const card = document.getElementById(`qcard-${qIdx}`);
  card.classList.add("answered");
  card.querySelectorAll(".opt-btn").forEach((btn, i) => {
    btn.classList.toggle("selected", i + 1 === val);
  });
  updateProgress();
  checkNextEnabled();
}

function updateProgress() {
  const answered = answers.filter(a => a !== null).length;
  const pct = Math.round((answered / 20) * 100);
  document.getElementById("prog-label").textContent = `질문 ${answered} / 20`;
  document.getElementById("prog-pct").textContent = `${pct}%`;
  document.getElementById("progress-fill").style.width = `${pct}%`;
}

function checkNextEnabled() {
  const questions = getPageQuestions(currentPage);
  const allAnswered = questions.every(({idx}) => answers[idx] !== null);
  const btnNext = document.getElementById("btn-next");
  btnNext.disabled = !allAnswered;
  btnNext.textContent = (currentPage === 3 && allAnswered) ? "결과 보기 🎯" : (currentPage === 3 ? "결과 보기 🎯" : "다음 →");
}

function nextPage() {
  const questions = getPageQuestions(currentPage);
  if (!questions.every(({idx}) => answers[idx] !== null)) return;
  if (currentPage < 3) {
    currentPage++;
    renderQuestions(currentPage);
    document.getElementById("btn-prev").disabled = false;
    window.scrollTo(0, 0);
  } else {
    showResult();
  }
}

function prevPage() {
  if (currentPage > 0) {
    currentPage--;
    renderQuestions(currentPage);
    document.getElementById("btn-prev").disabled = currentPage === 0;
    document.getElementById("btn-next").disabled = false;
    window.scrollTo(0, 0);
  }
}

function getTypeA() {
  const score = answers.slice(0, 10).reduce((a, b) => a + b, 0);
  return { score, type: TYPE_A.find(t => score >= t.range[0] && score <= t.range[1]) || TYPE_A[1] };
}
function getTypeB() {
  const score = answers.slice(10, 20).reduce((a, b) => a + b, 0);
  return { score, type: TYPE_B.find(t => score >= t.range[0] && score <= t.range[1]) || TYPE_B[1] };
}

function showResult() {
  const { score: scoreA, type: tA } = getTypeA();
  const { score: scoreB, type: tB } = getTypeB();
  const imgKey = `${tA.key}_${tB.key}`;
  const imgSrc = CHAR_IMAGES[imgKey] || CHAR_IMAGES["normal_average"];
  const rxItems = tB.rx.map(r => `<li>${r}</li>`).join("");

  document.getElementById("result-content").innerHTML = `
    <div style="padding:32px 0 16px;text-align:center;">
      <div style="font-family:'Jua',sans-serif;font-size:0.8rem;color:#888;margin-bottom:12px;letter-spacing:2px;">나의 개복치 유형</div>
      <div style="display:inline-block;background:${tB.color}22;border:2px solid ${tB.color};border-radius:99px;padding:6px 20px;font-family:'Jua',sans-serif;font-size:0.85rem;color:${tB.color};margin-bottom:24px;">
        ${tB.emoji} ${tB.name} &times; ${tA.emoji} ${tA.name}
      </div>

      <img src="${imgSrc}" class="result-img"
        style="border-color:${tB.color};box-shadow:0 0 48px ${tB.color}66;"
        alt="${tB.name} ${tA.name}">

      <div class="result-title" style="background:linear-gradient(135deg,${tB.color},${tA.color});-webkit-background-clip:text;-webkit-text-fill-color:transparent;">
        ${tB.name}<br>${tA.name}
      </div>
      <div class="result-subtitle">${tA.desc}<br>${tB.desc}</div>

      <div class="result-score-row">
        <div class="score-pill" style="background:${tA.color}22;border:1px solid ${tA.color}55;">
          <div class="sp-label">🫀 민감도</div>
          <div class="sp-val" style="color:${tA.color}">${scoreA}<span style="font-size:0.9rem">/100</span></div>
        </div>
        <div class="score-pill" style="background:${tB.color}22;border:1px solid ${tB.color}55;">
          <div class="sp-label">☕ 의존도</div>
          <div class="sp-val" style="color:${tB.color}">${scoreB}<span style="font-size:0.9rem">/100</span></div>
        </div>
      </div>

      <div class="result-cards" style="text-align:left;">
        <div class="result-card" style="border-color:${tA.color}44">
          <div class="result-card-icon">${tA.emoji}</div>
          <h3 style="color:${tA.color}">${tA.name}</h3>
          <p><strong style="color:${tA.color}">왜 민감할까?</strong><br><br>${tA.why}</p>
        </div>
        <div class="result-card" style="border-color:${tB.color}44">
          <div class="result-card-icon">${tB.emoji}</div>
          <h3 style="color:${tB.color}">${tB.name}</h3>
          <p><strong style="color:${tB.color}">현재 상태</strong><br><br>${tB.why}</p>
        </div>
      </div>

      <div class="prescription" style="text-align:left;">
        <h3>💊 처방전</h3>
        <ul style="padding-left:18px;">${rxItems}</ul>
      </div>

      <div style="background:#0a0a1a;border:1px solid #ffffff10;border-radius:14px;padding:16px;margin-bottom:28px;font-size:0.78rem;color:#666;line-height:1.7;text-align:left;">
        ⚠️ 이 테스트는 의학적 진단이 아닌 자가 인식을 위한 참고 자료입니다. 실제 건강 문제가 있다면 의료 전문가와 상담하세요.
      </div>
    </div>`;

  showScreen("result");
  window.scrollTo(0, 0);
}

function showScreen(name) {
  document.querySelectorAll(".screen").forEach(s => s.classList.remove("active"));
  document.getElementById(`screen-${name}`).classList.add("active");
}

function startTest() {
  currentPage = 0;
  answers = new Array(20).fill(null);
  renderQuestions(0);
  document.getElementById("btn-prev").disabled = true;
  showScreen("quiz");
  window.scrollTo(0, 0);
}

function restartTest() {
  showScreen("intro");
  window.scrollTo(0, 0);
}
</script>
</body>
</html>
